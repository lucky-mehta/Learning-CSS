<!-- -Create a webpage with a progress bar that showdown a smooth loading animation.
The progress bar should fill up from 0 to 100% with a smooth transition effect and a slight bounce when it reaches 100%. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECTICE SET LEVEL 7</title>
    <style>
        .progress-container{
            height: 25px;
            width: 90%;
            background-color: aqua;
            border: 2px solid black;
            border-radius: 20px;
            position: relative;
            left: 4%;
        }
        .progress-bar{
            height:100% ;
            border-radius: 20px;
            background-color: red;
            animation: animate-progress 4s ;

        }
        @keyframes animate-progress{
            0%{width: 0%;}
            90%{width:95%;}
            95%{width:70%;}
            100%{width:100%;}
        }
    </style>
</head>
<body>
    <div class="progress-container">
        <div class="progress-bar">

        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSEUDO-CLASSES</title>
    <style>
        .pseudo{
            height: 25px;
            width: 150px;
            background-color: forestgreen;
            border: 2px solid black;
            border-radius: 5px;
        }
        /* .pseudo:hover {
background-color: red;
height: 50px;
width: 300px;
        } */
         /* (ye dono aalag alag option h :hover and :active maine smjhne ke liye ak me hi likh diya h isiliye :hover option ko comment kiya h) */
        .pseudo:active {
            height: 250px;
            width: 300px;
            background-color: pink;
        }
    </style>
</head>
<body>
    <button class="pseudo">LEARNING PSEUDO</button>
</body>
</html>

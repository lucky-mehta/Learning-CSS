<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS TRANSFORM(TRANSLATE)</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            padding: 10px;
            margin: 50px;
            border: 2px solid black;
            border-radius: 5px;
            position: relative; 
            top: 50px;
            left: 50px;
            background-color: pink;
            text-align: center;
            transition: all 2s linear 0s;
        }
        #box1:hover{
            transform:translate(50px);
        }
        #box2:hover{
            transform:translate(-50px);
        }
        #box3:hover{
            transform:translate(50px,50px);
        }
        #box4:hover{
            transform:translateX(50px);
        }
        #box5:hover{
            transform: translateY(50px);
        }

    </style>
</head>
<body>
    <div id= "box1" class="box">Translate1</div>
    <div id= "box2" class="box">Translate2</div>
    <div id= "box3" class="box">Translate3</div>
    <div id= "box4" class="box">Translate4</div>
     <div id= "box5" class="box">Translate5</div>
</body>
</html>

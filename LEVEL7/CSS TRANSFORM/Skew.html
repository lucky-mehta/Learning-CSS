<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS TRANSFORM(SKEW)</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            padding: 10px;
            margin: 50px;
            border: 2px solid black;
            border-radius: 5px;
            position: relative; 
            top: 50px;
            left: 50px;
            background-color: pink;
            text-align: center;
            transition: all 2s linear 0s;
        }
        #box1:hover{
            transform:skew(45deg);
        }
        #box2:hover{
            transform:skew(90deg);
        }
       
    </style>
</head>
<body>
    <div id= "box1" class="box">Skew1</div>
    <div id= "box2" class="box">Skew2</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color property</title>
    <style>
        h1{
            color: red;
        }
        p{
            color: blue;
        }
    </style>
</head>
<body>
    <h1>THIS IS THE HEADING</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Unde, earum.</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASS SELECTOR</title>
<style>
    .first_heading{
        color: blue;
    }
    .random_text{
        color: yellow;
    }
</style>
</head>
<body>
    <h1 class="first_heading">this is the first heading</h1>
    <p class="random_text">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Possimus, nesciunt.</p>
    <h1 class="random_text">this is the last heading</h1>
</body>
</html>

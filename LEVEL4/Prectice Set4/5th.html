<!-- Create two boxes with different bo sizing values and observe change in box model. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fifth Problem</title>
    <style>
        .box{
            height: 100px;
            width: 100px;
            padding: 5px;
            margin: 5px;
            background-color: red;
            border: 3px solid black;
        }
    </style>
 </head>
 <body>
    <div class="box" style="box-sizing: content-box;">Box1</div>
    <div class="box" style="box-sizing: border-box;">Box2</div>
 </body>
 </html>

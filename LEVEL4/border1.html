<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Property(border-radius)</title>
    <style>
        .omg{
            width: 100px;
            height: 100px;
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div id="first" class="omg" style="background-color: red; border: 2px dotted yellow; border-radius: 10px;" >One</div>
    <div id="second" class="omg" style="background-color: aqua; border: 2px solid black; border-radius: 5px; ">Two</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    <title>Border Property</title>
    <style>
.two{
    height: 200px;
    width: 200px;
    padding: 2px;
    margin: 5px;
}
    </style>
</head>
<body>
    <div id="first" class="two" style="background-color: yellow; border: 2px solid red;"> CHECKER1</div>
    <div id="second"class="two" style="background-color: green; border: 4px dashed black;">CHECKER2</div>
    <div id="third" class="two" style="background-color: blue; border: 6px dotted pink;">CHECKER3</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXT ALIGN PROPERTIY</title>
    <style>
        #box1{
            height: 200px;
            width: 200px;
            background-color: aqua;
            text-align: left;
        }
                #box2{
            height: 200px;
            width: 200px;
            background-color: aqua;
            text-align: center;
        }

        #box3{
            height: 200px;
            width: 200px;
            background-color: aqua;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="box1">BOX1</div><br>
    <div id="box2">BOX2</div><br>
    <div id="box3">BOX3</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXT DECORATION PROPERTY</title>
    <style>
        #head{
            background-color: aqua;
            text-decoration: line-through;
            /* text-decoration: underline;
            text-decoration: none;
            text-decoration: overline; */
        }
            #second{
                background-color: bisque;
                text-decoration: underline;
                text-decoration-style: wavy; 
                /* text decoration style me hum kuchh bhi chosse kr skte h same as text decoration */
            }
            #third{
                background-color: red;
                text-decoration: underline;
                 text-decoration-style: double;
                 text-decoration-color: blue;
            }
            #link{
                color: blue;
                text-decoration: underline;
            }
        
    </style>
</head>
<body>
    <h1 id="head">this is the heading</h1>
    <h2 id="second">this is the second heading</h2>
    <h3 id="third">this is the third heading</h3>
    <a href="#" id="link">this is the link</a>
</body>
</html>

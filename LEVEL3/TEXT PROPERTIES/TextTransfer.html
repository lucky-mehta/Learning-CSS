<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEXT TRANSFORM PROPERTY</title>
    <style>
        #abc
        {
            color: aquamarine;
            background-color: blue;
            text-transform: uppercase;
        }
        #def{
            /* height: 50px;
            width: 50px;
            padding: 5px 10px 15px 20px;
            background-color: blue; */
            text-transform: lowercase;
        }
        #ghi{
            text-transform: capitalize;
        }
        #jkl{
            text-transform: none;
        }
    </style>
</head>
<body>
    <div id="abc">a for apple</div>
    <div id="def">B for boy</div>
    <div id="ghi">c For cat</div>
    <div id="jkl">d for dog</div>
</body>
</html>
